name: Update userAgent.txt

on:
  schedule:
    # 06:00 UTC on the 1st day of every month
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update userAgent.txt
        run: python3 scripts/update_useragent.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- userAgent.txt; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add userAgent.txt
          git commit -m "chore: update userAgent.txt to latest Firefox version"
          git push
